- name: Configure port authentication policy
  cisco.ios.ios_config:
    src: main-policy-map.j2
  notify: save config

- name: Configure dynamic authorization clients
  cisco.ios.ios_config:
    lines:
      - "client 10.220.50.33 server-key {{ radius_key }}"
      - "client 10.220.50.34 server-key {{ radius_key }}"
    parents: "aaa server radius dynamic-author"
    before:
      - end
    after:
      - end
    match: exact

- name: access-session attributes filter-list -> sensor_list
  cisco.ios.ios_config:
    parents: access-session attributes filter-list list sensor_list
    lines:
      - cdp
      - lldp
      - dhcp

- name: access-session accounting -> include sensor_list
  cisco.ios.ios_config:
    lines:
      - access-session accounting attributes filter-spec include list sensor_list

- name: device-sensor filter-list (DHCP)
  cisco.ios.ios_config:
    parents: device-sensor filter-list dhcp list dhcp-list
    lines:
      - option name host-name
      - option name class-identifier
      - option name client-identifier

- name: device-sensor filter-list (LLDP)
  cisco.ios.ios_config:
    parents: device-sensor filter-list lldp list lldp-list
    lines:
      - tlv name system-name
      - tlv name system-description
      - tlv name system-capabilities

- name: device-sensor filter-list (CDP)
  cisco.ios.ios_config:
    parents: device-sensor filter-list cdp list cdp-list
    lines:
      - tlv name device-name
      - tlv name address-type
      - tlv name capabilities-type
      - tlv name version-type
      - tlv name platform-type

- name: device-sensor filter-spec include lists
  cisco.ios.ios_config:
    lines:
      - device-sensor filter-spec dhcp include list dhcp-list
      - device-sensor filter-spec lldp include list lldp-list
      - device-sensor filter-spec cdp include list cdp-list

- name: device-sensor notify all-changes (and save if modified)
  cisco.ios.ios_config:
    lines:
      - device-sensor notify all-changes
    save_when: changed



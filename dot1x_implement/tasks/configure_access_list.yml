---
- name: Configure ACL al-fs-full-access-in
  cisco.ios.ios_config:
    lines: "{{ lookup('template', 'acl/al-fs-full-access-in.j2').splitlines() }}"
    parents: ip access-list extended al-fs-full-access-in
    save_when: changed

- name: Configure ACL al-fs-limited-access-in
  cisco.ios.ios_config:
    lines: "{{ lookup('template', 'acl/al-fs-limited-access-in.j2').splitlines() }}"
    parents: ip access-list extended al-fs-limited-access-in
    save_when: changed

- name: Configure ACL al-fs-quarantined-access-in
  cisco.ios.ios_config:
    lines: "{{ lookup('template', 'acl/al-fs-quarantined-access-in.j2').splitlines() }}"
    parents: ip access-list extended al-fs-quarantined-access-in
    save_when: changed

---
# ========================================================================
# Cisco ForeScout 802.1X Baseline Configuration
# Device: cticblrm6ncas01-cp94 (Catalyst 9300-48UXM)
# Model: C9300-48UXM (48x 1GE + 48x 10GE + 2x 40GE)
# IOS-XE Version: 17.9
# Last Updated: 2025-10-30
# Purpose: ForeScout NAC Integration with 802.1X Port-Based Access Control
# ========================================================================


## Forescout VIP ##
tvt_forescout_vip_1: 10.220.50.33

## Interafce Jinja2 variables ##
dot1x_keywords_prod:
  - Workstation

## Interafce Jinja2 variables ##
dot1x_keywords:
  - test-aaa

## Policy-map vars ##
policy_name: "PORT-AUTH-POLICY"
dot1x_retries: 2
dot1x_retry_time: 7
auth_restart_timer: 60
failopen_data_template: "TEMPLATE_FAILOPEN_DATA"
failopen_voice_template: "TEMPLATE_FAILOPEN_VOICE"
pass_auth_data_template: "TEMPLATE_PASS_AUTH_DATA"
pass_auth_voice_template: "TEMPLATE_PASS_AUTH_VOICE"

# RADIUS Server Configuration
radius_servers:
  - name: FORESCOUT_RADIUS_VIP1
    address: 10.220.50.33
    auth_port: 1812
    acct_port: 1813
    timeout: 5
    automate_tester:
      username: radiushealthcheck
      ignore_acct_port: true
      idle_time: 4
    key: "0505070C741F4D1B5A114441"
    key_type: 7

  - name: FORESCOUT_RADIUS_VIP2
    address: 10.220.50.34
    auth_port: 1812
    acct_port: 1813
    timeout: 5
    automate_tester:
      username: radiushealthcheck
      ignore_acct_port: true
      idle_time: 4
    key: "000A1205510808144C351F1D"
    key_type: 7

# AAA Group Server Configuration
aaa_group_servers:
  - name: FORESCOUT
    type: radius
    servers:
      - FORESCOUT_RADIUS_VIP1
      - FORESCOUT_RADIUS_VIP2
    source_interface: Loopback0
    deadtime: 5

# AAA Authentication Configuration
aaa_authentication:
  dot1x:
    default: "group FORESCOUT"

# AAA Authorization Configuration
aaa_authorization:
  network:
    default: "group FORESCOUT"

# AAA Accounting Configuration
aaa_accounting:
  identity_default: "start-stop group FORESCOUT"
  network_default: "start-stop group FORESCOUT"
  update_newinfo_periodic: 2880

# AAA Server RADIUS Dynamic Author (CoA)
radius_dynamic_author:
  clients:
    - address: 10.220.50.33
      server_key: "1217041447580F16693F777B"
      key_type: 7
    - address: 10.220.50.34
      server_key: "1217041447580F16693F777B"
      key_type: 7

# RADIUS Server Attributes
radius_attributes:
  attribute_6: true  # on-for-login-auth
  attribute_8: true  # include-in-access-req
  attribute_32:
    enabled: true
    format: "CBA-CISCO-SW-%i"
  attribute_25: true  # access-request include
  attribute_31:
    mac_format: "ietf upper-case"
    send_nas_port_detail: "mac-only"

# RADIUS Server Dead Criteria
radius_dead_criteria:
  time: 20
  tries: 3

radius_deadtime: 5

# 802.1X Global Configuration
dot1x:
  system_auth_control: true
  critical_eapol: true

# Access Session Configuration
access_session:
  mac_move: "deny"
  acl_default: "passthrough"

# Class Maps
class_maps:
  - name: CM-DOT1X_FAILED
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match method dot1x"
      - "match result-type method dot1x authoritative"

  - name: CM-DOT1X_NO_RESP
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match method dot1x"
      - "match result-type method dot1x agent-not-found"

  - name: CM-IN_FAILOPEN
    type: "control subscriber"
    match: "match-any"
    conditions:
      - "match activated-service-template TEMPLATE_FAILOPEN_DATA"

  - name: CM-MAB_FAILED
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match method mab"
      - "match result-type method mab authoritative"

  - name: CM-NOT_IN_FAILOPN
    type: "control subscriber"
    match: "match-none"
    conditions:
      - "match activated-service-template TEMPLATE_FAILOPEN_DATA"

  - name: CM-SVRDOWN_AUTH
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match result-type aaa-timeout"
      - "match authorization-status authorized"

  - name: CM-SVRDOWN_UNAUTH
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match result-type aaa-timeout"
      - "match authorization-status unauthorized"

  - name: CM-TEST
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match method dot1x"

  - name: CM_CLIENT_VOICE
    type: "control subscriber"
    match: "match-all"
    conditions:
      - "match client-type voice"

# Policy Map Configuration
policy_map:
  name: PORT-AUTH-POLICY
  type: "control subscriber"
  events:
    - name: session-started
      match: "match-all"
      sequence: 10
      class: "always"
      action: "do-until-failure"
      commands:
        - seq: 10
          command: "authenticate using dot1x retries 2 retry-time 7 priority 10"

    - name: authentication-failure
      match: "match-first"
      actions:
        - sequence: 5
          class: CM-DOT1X_FAILED
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "terminate dot1x"
            - seq: 20
              command: "authenticate using mab priority 20"
        - sequence: 10
          class: CM-SVRDOWN_UNAUTH
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "activate service-template TEMPLATE_FAILOPEN_DATA"
            - seq: 15
              command: "activate service-template TEMPLATE_FAILOPEN_VOICE"
            - seq: 20
              command: "authorize"
            - seq: 30
              command: "pause reauthentication"
        - sequence: 20
          class: CM-SVRDOWN_AUTH
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "pause reauthentication"
            - seq: 20
              command: "authorize"
        - sequence: 30
          class: CM-DOT1X_NO_RESP
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "terminate dot1x"
            - seq: 20
              command: "authenticate using mab priority 20"
        - sequence: 40
          class: CM-MAB_FAILED
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "terminate mab"
            - seq: 20
              command: "authentication-restart 60"
        - sequence: 60
          class: "always"
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "terminate dot1x"
            - seq: 20
              command: "terminate mab"
            - seq: 30
              command: "authentication-restart 60"

    - name: agent-found
      match: "match-all"
      sequence: 10
      class: "always"
      action: "do-until-failure"
      commands:
        - seq: 10
          command: "terminate mab"
        - seq: 20
          command: "authenticate using dot1x retries 2 retry-time 7 priority 10"

    - name: aaa-available
      match: "match-all"
      actions:
        - sequence: 10
          class: CM-IN_FAILOPEN
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "clear-session"
        - sequence: 20
          class: CM-NOT_IN_FAILOPN
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "resume reauthentication"

    - name: inactivity-timeout
      match: "match-all"
      sequence: 10
      class: "always"
      action: "do-until-failure"
      commands:
        - seq: 10
          command: "clear-session"

    - name: violation
      match: "match-all"
      sequence: 10
      class: "always"
      action: "do-until-failure"
      commands:
        - seq: 10
          command: "restrict"

    - name: authentication-success
      match: "match-first"
      actions:
        - sequence: 5
          class: CM_CLIENT_VOICE
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "activate service-template TEMPLATE_PASS_AUTH_VOICE"
        - sequence: 10
          class: "always"
          action: "do-until-failure"
          commands:
            - seq: 10
              command: "activate service-template TEMPLATE_PASS_AUTH_DATA"

# Service Templates
service_templates:
  - name: DEFAULT_LINKSEC_POLICY_MUST_SECURE
    config:
      - "linksec policy must-secure"

  - name: DEFAULT_LINKSEC_POLICY_SHOULD_SECURE
    config:
      - "linksec policy should-secure"

  - name: DEFAULT_CRITICAL_VOICE_TEMPLATE
    config:
      - "voice vlan"

  - name: DEFAULT_CRITICAL_DATA_TEMPLATE
    config: []

  - name: webauth-global-inactive
    config:
      - "inactivity-timer 3600"

  - name: TEMPLATE_PASS_AUTH_DATA
    config:
      - "access-group al-fs-full-access-in"

  - name: TEMPLATE_PASS_AUTH_VOICE
    config:
      - "access-group al-fs-full-access-in"
      - "voice vlan"

  - name: TEMPLATE_FAILOPEN_DATA
    config:
      - "access-group al-fs-full-access-in"

  - name: TEMPLATE_FAILOPEN_VOICE
    config:
      - "access-group al-fs-full-access-in"
      - "voice vlan"

# Device Tracking Policy
device_tracking_policy:
  name: IPDT_POLICY
  protocol_udp: false
  tracking_enable: true

# Access Session Attributes
access_session_attributes:
  filter_list: "sensor_list"
  filters:
    - cdp
    - lldp
    - dhcp
  accounting_filter_spec: "sensor_list"

# Device Sensor Configuration
device_sensor:
  filter_lists:
    dhcp:
      name: dhcp-list
      options:
        - host-name
        - class-identifier
        - client-identifier

    lldp:
      name: lldp-list
      tlvs:
        - system-name
        - system-description
        - system-capabilities

    cdp:
      name: cdp-list
      tlvs:
        - device-name
        - address-type
        - capabilities-type
        - version-type
        - platform-type

  filter_specs:
    - protocol: dhcp
      action: include
      list: dhcp-list
    - protocol: lldp
      action: include
      list: lldp-list
    - protocol: cdp
      action: include
      list: cdp-list

  notify_all_changes: true

# Interface Template
interface_template:
  name: PORT-AUTH-TEMPLATE
  config:
    dot1x:
      pae: authenticator
      timeout_tx_period: 7
    mab: true
    access_session:
      host_mode: "multi-domain"
      control_direction: "in"
      closed: true
      port_control: "auto"
    authentication:
      periodic: true
      timer_reauthenticate: 28800
    service_policy:
      type: "control subscriber"
      name: "PORT-AUTH-POLICY"

# Sample Interface Configuration
sample_interface:
  name: GigabitEthernet1/0/17
  description: Workstation
  access_vlan: 152
  switchport_mode: access
  port_security:
    enabled: true
    maximum: 3
    violation: restrict
    aging_time: 5
    aging_type: inactivity
  ip_arp_inspection_rate: 100
  logging_link_status: false
  snmp_mac_notification:
    added: true
    removed: true
  storm_control_broadcast: 10.00
  spanning_tree:
    portfast: true
    bpduguard: true
  ip_verify_source: true


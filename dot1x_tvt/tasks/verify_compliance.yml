      ansible.builtin.debug:
        msg: "{{ tvt_forescout_state }}"
        
    - name: Show Running Config
      cisco.ios.ios_command: 
        commands: show run
      register: tvt_pre_running_config
    - name: Record Pre-check State
      ansible.builtin.set_stats:
        data:
          tvt_forescout_state: "{{ tvt_forescout_state }}"
          tvt_pre_running_config: "{{ tvt_pre_running_config }}"


